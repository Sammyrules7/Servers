apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: sammy
  namespace: openclaw
  labels:
    app.kubernetes.io/part-of: openclaw
    openclaw.maio-tech.com/owner: sammy
spec:
  envFrom:
    - secretRef:
        name: sammy-discord
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: "2026.7.1"
    pullPolicy: IfNotPresent
  config:
    raw:
      agents:
        defaults:
          model:
            primary: openai/gpt-5.6-terra
      channels:
        discord:
          enabled: true
          dmPolicy: allowlist
          allowFrom:
            - "772830229356871720"
          groupPolicy: disabled
      commands:
        ownerAllowFrom:
          - "discord:772830229356871720"
      plugins:
        allow:
          - discord
        entries:
          discord:
            enabled: true
  plugins:
    - "@openclaw/discord"
  runtimeDeps:
    pnpm: true
    python: true
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - workspaceFiles
  gateway:
    controlUiOrigins:
      - https://sammy-openclaw.maio-tech.com
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  storage:
    persistence:
      enabled: true
      storageClass: longhorn
      size: 5Gi
      accessModes:
        - ReadWriteOnce
  security:
    networkPolicy:
      enabled: true
      allowedIngressNamespaces:
        - envoy
  networking:
    service:
      type: ClusterIP
    httpRoute:
      enabled: true
      parentRefs:
        - name: gateway
          namespace: ingress
          sectionName: websecure-sub
      hostnames:
        - sammy-openclaw.maio-tech.com
---
