apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: applications
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
    - name: main-instances
  interval: 5m
  path: ./cluster/applications
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
