apiVersion: garage.rajsingh.info/v1beta1
kind: GarageCluster
metadata:
  name: garage-main-cluster
  namespace: garage-cluster
spec:
  replicas: 3
  replication:
    factor: 2
  layoutPolicy: Auto
  storage:
    metadata:
      size: 1Gi
      storageClassName: local-path
    data:
      size: 10Gi
      storageClassName: local-path
  admin:
    adminTokenSecretRef:
      name: garage-admin-token
      key: admin-token
