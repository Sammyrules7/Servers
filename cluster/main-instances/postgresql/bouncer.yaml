apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: main-rw-postgres-pooler
  namespace: postgres
spec:
  cluster:
    name: postgres
  instances: 4
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "1000"
      default_pool_size: "20"

  serviceTemplate:
    spec:
      internalTrafficPolicy: Local

  template:
    spec:
      containers: []
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: cnpg.io/poolerName
                    operator: In
                    values:
                      - main-rw-postgres-pooler
              topologyKey: "kubernetes.io/hostname"
