apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openclaw-operator
  namespace: flux-system
spec:
  interval: 15m
  type: oci
  url: oci://ghcr.io/paperclipinc/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: openclaw-operator-system
spec:
  interval: 15m
  chart:
    spec:
      chart: openclaw-operator
      version: "0.38.1"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    metrics:
      serviceMonitor:
        enabled: false
    webhook:
      enabled: false
