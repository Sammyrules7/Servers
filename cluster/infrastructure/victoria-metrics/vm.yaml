apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: victoria-metrics
  namespace: metrics
spec:
  interval: 1h
  url: https://victoriametrics.github.io/helm-charts/

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics-k8s-stack
  namespace: metrics
spec:
  interval: 15m0s
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.81.x"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: metrics
  values:
    vmagent:
      spec:
        externalLabels:
          Dum: "mmy"
    grafana:
      enabled: true
      envFromSecret: oidc-creds
      grafana.ini:
        server:
          root_url: https://grafana.maio-tech.com
        auth:
          oauth_auto_login: true
        auth.generic_oauth:
          enabled: true
          name: "Authoneer"
          scopes: "openid email groups profile"
          client_id: "$__env{AUTHENTIK_CLIENT_ID}"
          client_secret: "$__env{AUTHENTIK_CLIENT_SECRET}"
          auth_url: https://auth.maio-tech.com/application/o/authorize/
          token_url: https://auth.maio-tech.com/application/o/token/
          api_url: https://auth.maio-tech.com/application/o/userinfo/
          email_attribute_name: email
          login_attribute_name: preferred_username
          name_attribute_name: name
          validate_id_token: true
          use_pkce: true
          role_attribute_path: "contains(groups, 'Grafana Admins') && 'GrafanaAdmin' || contains(groups, 'Grafana Editors') && 'Editor' || 'Viewer'"
          role_attribute_strict: true
          allow_assign_grafana_admin: true
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          searchNamespace: ALL
        datasources:
          enabled: true
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
