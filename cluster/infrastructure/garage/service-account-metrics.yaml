apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vm-scrape-garage-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # This role is usually created by the garage-operator chart automatically
  # If not found, you can use 'cluster-admin' for testing (though less secure)
  name: garage-operator-metrics-reader
subjects:
  - kind: ServiceAccount
    # CHANGE THIS to your actual VictoriaMetrics ServiceAccount name
    name: vmagent-victoria-metrics-k8s-stack
    # CHANGE THIS to the namespace where VictoriaMetrics is installed
    namespace: victoria-metrics
