apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  interval: 15m0s
  chart:
    spec:
      chart: traefik
      version: "40.x.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    deployment:
      replicas: 3
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      enabled: false
    metrics:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
        addRoutersLabels: true
        addServicesLabels: true
