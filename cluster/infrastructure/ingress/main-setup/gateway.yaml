apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: ingress
spec:
  gatewayClassName: envoy
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy
  listeners:
    - name: websecure-tld
      port: 443
      protocol: HTTPS
      hostname: "maio-tech.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: tld-cert
      allowedRoutes:
        namespaces:
          from: All

    - name: websecure-sub
      port: 443
      protocol: HTTPS
      hostname: "*.maio-tech.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: sub-domain
      allowedRoutes:
        namespaces:
          from: All

    - name: websecure-attic
      port: 443
      protocol: HTTPS
      hostname: "attic.maio-tech.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: attic-letsencrypt-cert
      allowedRoutes:
        namespaces:
          from: All

    - name: websecure-svc
      port: 443
      protocol: HTTPS
      hostname: "*.svc.maio-tech.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: s3-letsencrypt-cert
      allowedRoutes:
        namespaces:
          from: All
