apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: cloudflare-mtls
  namespace: ingress
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy

  tls:
    clientValidation:
      caCertificateRefs:
        - kind: Secret
          group: ""
          name: cloudflare-public
