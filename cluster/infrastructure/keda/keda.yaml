apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: keda
  namespace: keda
spec:
  interval: 1h
  url: https://kedacore.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  interval: 15m0s
  chart:
    spec:
      chart: keda
      version: "2.20.0"
      sourceRef:
        kind: HelmRepository
        name: keda
        namespace: keda
  #values:
