apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: cluster-config
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/sammy/Documents-Code-Servers
  ref:
    branch: main
  secretRef:
    name: flux-auth
---
apiVersion: v1
kind: Secret
metadata:
  name: flux-auth
  namespace: flux-system
type: Opaque
# Create with: kubectl create secret generic flux-auth --from-literal=username=git --from-literal=token=YOUR_GH_TOKEN
# Or use SOPS to encrypt this file