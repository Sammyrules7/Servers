apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster
  namespace: flux-system
spec:
  interval: 5m
  path: clusters/k3s
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster-config
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg